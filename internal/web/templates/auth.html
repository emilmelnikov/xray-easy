<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #172033;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100% - 32px, 380px);
      padding: 32px;
      border: 1px solid #d9e0ec;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 20px 50px rgb(23 32 51 / 10%);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 24px;
      color: #66738a;
    }
    label {
      display: block;
      margin: 16px 0 6px;
      font-size: 14px;
      font-weight: 600;
    }
    input[type="email"],
    input[type="password"] {
      box-sizing: border-box;
      width: 100%;
      height: 44px;
      border: 1px solid #b9c3d3;
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 18px 0 22px;
      color: #47546a;
      font-size: 14px;
    }
    button {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 6px;
      background: #1f4f8f;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin: 0 0 16px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #fff1f1;
      color: #a32222;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    <p>Use your account credentials to continue.</p>
    {{if .Error}}<div class="error" role="alert">{{.Error}}</div>{{end}}
    <form method="post" action="/auth">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" value="{{.Email}}" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <label class="row">
        <input name="remember" type="checkbox" value="1">
        <span>Remember this device</span>
      </label>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
