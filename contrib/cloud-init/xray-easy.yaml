#cloud-config
package_update: true
packages:
  - ca-certificates
  - cosign
  - curl
  - gzip

write_files:
  - path: /usr/local/sbin/install-xray-easy
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env sh
      set -eu

      github_repo="${XRAY_EASY_GITHUB_REPO:-emilmelnikov/xray-easy}"
      version="${XRAY_EASY_VERSION:-latest}"

      case "$(uname -m)" in
        x86_64|amd64)
          arch="amd64"
          ;;
        aarch64|arm64)
          arch="arm64"
          ;;
        *)
          echo "unsupported architecture: $(uname -m)" >&2
          exit 1
          ;;
      esac

      asset="xray-easy-linux-${arch}.gz"
      if [ "$version" = "latest" ]; then
        base_url="https://github.com/${github_repo}/releases/latest/download"
      else
        base_url="https://github.com/${github_repo}/releases/download/${version}"
      fi

      tmp_dir="$(mktemp -d)"
      trap 'rm -rf "$tmp_dir"' EXIT
      asset_path="${tmp_dir}/${asset}"
      checksums_path="${tmp_dir}/checksums.txt"
      bundle_path="${tmp_dir}/checksums.txt.sigstore.json"
      bin_tmp="${tmp_dir}/xray-easy"

      curl --fail --location --retry 3 --output "$asset_path" "${base_url}/${asset}"
      curl --fail --location --retry 3 --output "$checksums_path" "${base_url}/checksums.txt"
      curl --fail --location --retry 3 --output "$bundle_path" "${base_url}/checksums.txt.sigstore.json"

      escaped_repo="$(printf '%s' "$github_repo" | sed 's|[][\\.^$*+?{}()|]|\\&|g')"
      cosign verify-blob \
        --bundle "$bundle_path" \
        --certificate-identity-regexp "https://github.com/${escaped_repo}/.github/workflows/release.yml@refs/tags/.*" \
        --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
        "$checksums_path"

      (cd "$tmp_dir" && grep "  ${asset}$" checksums.txt | sha256sum -c -)
      gzip -dc "$asset_path" > "$bin_tmp"
      install -o root -g root -m 0755 "$bin_tmp" /usr/local/bin/xray-easy
  - path: /usr/local/sbin/update-xray-easy
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env sh
      set -eu

      XRAY_EASY_VERSION="${XRAY_EASY_VERSION:-latest}" /usr/local/sbin/install-xray-easy
      systemctl try-restart xray-easy.service
  - path: /etc/systemd/system/xray-easy.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=xray-easy service
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=xray-easy
      Group=xray-easy
      WorkingDirectory=/etc/xray-easy
      Environment=XRAY_EASY_CONFIG=/etc/xray-easy/config.json
      Environment=XRAY_EASY_USERS=/etc/xray-easy/users.json
      EnvironmentFile=-/etc/default/xray-easy
      ExecStart=/usr/local/bin/xray-easy serve -config ${XRAY_EASY_CONFIG} -users ${XRAY_EASY_USERS}
      Restart=on-failure
      RestartSec=5s
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/etc/xray-easy
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE

      [Install]
      WantedBy=multi-user.target
  - path: /etc/default/xray-easy
    owner: root:root
    permissions: "0644"
    content: |
      XRAY_EASY_CONFIG=/etc/xray-easy/config.json
      XRAY_EASY_USERS=/etc/xray-easy/users.json

runcmd:
  - [sh, -c, "getent group xray-easy >/dev/null || groupadd --system xray-easy"]
  - [sh, -c, "id -u xray-easy >/dev/null 2>&1 || useradd --system --no-create-home --home-dir /nonexistent --shell /usr/sbin/nologin --gid xray-easy xray-easy"]
  - [install, -d, -o, xray-easy, -g, xray-easy, -m, "0750", /etc/xray-easy]
  - [/usr/local/sbin/install-xray-easy]
  - [systemctl, daemon-reload]
  - [systemctl, enable, xray-easy.service]
